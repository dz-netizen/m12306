<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>M12306 - 注册账户</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
	<div class="login-card">
		<div class="login-header">
			<img class="logo" src="/logo.png" alt="M12306 Logo">
			<div class="brand">M12306</div>
			<div class="tagline">创建新账户</div>
		</div>
		<div class="login-body">
			<form method="get" action="/cgi-bin/register.cgi">
				<div class="form-group">
					<label for="username">用户名</label>
					<input type="text" id="username" name="username" maxlength="20" required placeholder="请输入用户名">
				</div>
				<div class="form-group">
					<label for="phone">手机号码</label>
					<input type="tel" id="phone" name="phone" pattern="[0-9]{11}" maxlength="11" required placeholder="请输入11位手机号">
				</div>
				<div class="form-group">
					<label for="name">真实姓名</label>
					<input type="text" id="name" name="name" maxlength="20" required placeholder="请输入真实姓名">
				</div>
				<div class="form-group">
					<label for="password">密码</label>
					<input type="password" id="password" name="password" maxlength="100" required placeholder="请设置密码">
				</div>
				<input type="submit" value="注 册">
			</form>
			<div class="form-footer">
				已有账户？<a href="/m12306index.html">返回登录</a>
			</div>
		</div>
	</div>
</body>
</html>
