<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>M12306 - 铁路购票系统</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
	<div class="login-card">
		<div class="login-header">
			<img class="logo" src="/logo.png" alt="M12306 Logo">
			<div class="brand">M12306</div>
			<div class="tagline">铁路购票管理系统</div>
		</div>
		<div class="login-body">
			<form method="get" action="/cgi-bin/login.cgi">
				<div class="form-group">
					<label for="username">用户名</label>
					<input type="text" id="username" name="username" maxlength="20" required autocomplete="username" placeholder="请输入用户名">
				</div>
				<div class="form-group">
					<label for="password">密码</label>
					<input type="password" id="password" name="password" maxlength="100" required autocomplete="current-password" placeholder="请输入密码">
				</div>
				<input type="submit" value="登 录">
			</form>
			<div class="form-footer">
				还没有账户？<a href="/register.html">前往注册</a>
			</div>
		</div>
	</div>
</body>
</html>
