<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>M12306 - 查询列车</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<div class="container">
		<div class="header">
			<h1>M12306</h1>
			<p>查询列车信息</p>
		</div>
		<div class="content">
			<a id="back_home" href="/cgi-bin/home.cgi" class="back-link">← 返回首页</a>
			<form method="get" action="/cgi-bin/query_train.cgi" class="query-form">
				<div class="form-group">
					<label for="username">用户名</label>
					<input type="text" id="username" name="username" required>
				</div>
				<div class="form-group">
					<label for="train_id">列车号</label>
					<input type="text" id="train_id" name="train_id" placeholder="例如: G1" required>
				</div>
				<div class="form-group">
					<label for="date">出发日期</label>
					<input type="date" id="date" name="date" required>
				</div>
				<input type="submit" value="查 询">
			</form>
		</div>
	</div>

	<script>
		const q = new URLSearchParams(window.location.search);
		const usernameInput = document.getElementById("username");
		const dateInput = document.getElementById("date");
		const backHome = document.getElementById("back_home");

		if (!q.has("date")) {
			const d = new Date();
			d.setDate(d.getDate() + 1);
			dateInput.value = d.toISOString().slice(0, 10);
		}

		if (q.has("username")) {
			usernameInput.value = q.get("username");
		}
		if (q.has("date")) {
			dateInput.value = q.get("date");
		}

		function updateBackHome() {
			const u = usernameInput.value.trim();
			backHome.href = u ? ("/cgi-bin/home.cgi?username=" + encodeURIComponent(u)) : "/cgi-bin/home.cgi";
		}

		usernameInput.addEventListener("input", updateBackHome);
		updateBackHome();
	</script>
</body>
</html>
