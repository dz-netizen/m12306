<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>Query Train</title>
</head>
<body bgcolor="#f7f7f7" text="#111111">
	<h2>Query Train</h2>
	<p>
		<a id="back_home" href="/cgi-bin/home.cgi">Back Home</a>
	</p>
	<form method="get" action="/cgi-bin/query_train.cgi">
		Username: <input type="text" name="username" id="username" required><br><br>
		Train ID: <input type="text" name="train_id" placeholder="G1" required><br><br>
		Date: <input type="date" name="date" id="date"><br><br>
		<input type="submit" value="Search">
	</form>

	<script>
		const q = new URLSearchParams(window.location.search);
		const usernameInput = document.getElementById("username");
		const dateInput = document.getElementById("date");
		const backHome = document.getElementById("back_home");

		if (!q.has("date")) {
			const d = new Date();
			d.setDate(d.getDate() + 1);
			dateInput.value = d.toISOString().slice(0, 10);
		}

		if (q.has("username")) {
			usernameInput.value = q.get("username");
		}
		if (q.has("date")) {
			dateInput.value = q.get("date");
		}

		function updateBackHome() {
			const u = usernameInput.value.trim();
			backHome.href = u ? ("/cgi-bin/home.cgi?username=" + encodeURIComponent(u)) : "/cgi-bin/home.cgi";
		}

		usernameInput.addEventListener("input", updateBackHome);
		updateBackHome();
	</script>
</body>
</html>
