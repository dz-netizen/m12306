<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>M12306 - 查询线路</title>
	<link rel="stylesheet" href="/style.css">
</head>
<body>
	<div class="container">
		<div class="header">
			<h1>M12306</h1>
			<p>查询线路信息</p>
		</div>
		<div class="content">
			<a id="back_home" href="/cgi-bin/home.cgi" class="back-link">← 返回首页</a>
			<form method="get" action="/cgi-bin/query_route.cgi" class="query-form">
				<div class="form-group">
					<label for="username">用户名</label>
					<input type="text" id="username" name="username" required>
				</div>
				<div class="form-group">
					<label for="from_city">出发城市</label>
					<input type="text" id="from_city" name="from_city" required>
				</div>
				<div class="form-group">
					<label for="to_city">到达城市</label>
					<input type="text" id="to_city" name="to_city" required>
				</div>
				<div class="form-group">
					<label for="date">出发日期</label>
					<input type="date" id="date" name="date" required>
				</div>
				<div class="form-group">
					<label for="time">出发时间</label>
					<input type="time" id="time" name="time" value="00:00">
				</div>
				<input type="submit" value="查 询">
			</form>
		</div>
	</div>

	<script>
		const q = new URLSearchParams(window.location.search);
		const usernameInput = document.getElementById("username");
		const dateInput = document.getElementById("date");
		const backHome = document.getElementById("back_home");

		if (!q.has("date")) {
			const d = new Date();
			d.setDate(d.getDate() + 1);
			dateInput.value = d.toISOString().slice(0, 10);
		}

		["username", "from_city", "to_city", "date", "time"].forEach(k => {
			if (q.has(k)) {
				const el = document.getElementById(k);
				if (el) el.value = q.get(k);
			}
		});

		function updateBackHome() {
			const u = usernameInput.value.trim();
			backHome.href = u ? ("/cgi-bin/home.cgi?username=" + encodeURIComponent(u)) : "/cgi-bin/home.cgi";
		}

		usernameInput.addEventListener("input", updateBackHome);
		updateBackHome();
	</script>
</body>
</html>
